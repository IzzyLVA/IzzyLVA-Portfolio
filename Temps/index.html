<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZZY | Cyber Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        :root {
            --red: #ff004d;
            --purple: #c300ff;
            --cyan: #00f9ff;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
        }
        
        .glitch {
            position: relative;
            color: var(--red);
            animation: glitch 0.8s linear infinite;
        }
        
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
        
        /* Central Targeting Reticle HUD */
        .reticle {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            z-index: -1;
            opacity: 0.35;
            pointer-events: none;
        }
        
        .reticle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -120px;
            width: 680px;
            height: 2px;
            background: var(--red);
            box-shadow: 0 0 25px var(--red);
        }
        
        .reticle::after {
            content: '';
            position: absolute;
            left: 50%;
            top: -120px;
            height: 680px;
            width: 2px;
            background: var(--red);
            box-shadow: 0 0 25px var(--red);
        }
        
        .corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 4px solid var(--purple);
            box-shadow: 0 0 20px var(--purple);
        }
        .tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        .tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
        .bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
        .br { bottom: -10px; right: -10px; border-left: none; border-top: none; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden relative">
    <!-- Reticle HUD -->
    <div class="reticle">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-md border-b border-red-500/30">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-red-500 to-purple-600 rounded flex items-center justify-center text-2xl font-bold border-2 border-cyan-400">I</div>
                <span class="text-3xl font-bold tracking-widest glitch">IZZY</span>
            </a>
            
            <div class="flex gap-8 text-sm uppercase tracking-widest font-medium">
                <a href="about.html" class="hover:text-red-400 transition-colors">PROFILE</a>
                <a href="skills.html" class="hover:text-red-400 transition-colors">MODULES</a>
                <a href="projects.html" class="hover:text-red-400 transition-colors">OPERATIONS</a>
                <a href="experience.html" class="hover:text-red-400 transition-colors">LOG</a>
                <a href="contact.html" class="hover:text-red-400 transition-colors">CONNECT</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="min-h-screen flex items-center justify-center pt-20">
        <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
            <div class="mb-8">
                <span class="inline-block px-8 py-3 bg-red-500/10 border border-red-500 text-red-400 text-sm tracking-[4px]">WEST COAST NODE ACTIVE</span>
            </div>
            
            <h1 class="text-8xl font-bold tracking-tighter mb-6 text-white">IZZY</h1>
            <p class="text-4xl text-purple-400 mb-16">ETHICAL HACKER &amp; CYBER OPERATIVE</p>
            
            <div class="flex flex-col sm:flex-row gap-6 justify-center">
                <a href="projects.html" 
                   class="px-14 py-6 border-2 border-red-500 text-red-400 hover:bg-red-500 hover:text-white text-lg font-mono tracking-widest transition-all">
                    ACCESS OPERATIONS
                </a>
                <a href="contact.html" 
                   class="px-14 py-6 bg-purple-600 hover:bg-purple-700 text-white text-lg font-mono tracking-widest transition-all">
                    ESTABLISH LINK
                </a>
            </div>
        </div>
    </section>

    <footer class="fixed bottom-6 left-0 right-0 text-center text-xs text-gray-500 z-10">
        © 2026 IZZY PROTOCOLS
    </footer>
</body>
</html>
